# docker-compose.yml
#
# Scanner usage:
#
#   # Scan the current directory and open the web UI on http://localhost:7777
#   docker compose up serve
#
#   # Scan a specific project
#   PROJECT_DIR=/path/to/myapp PROJECT_KEY=myapp docker compose up serve
#
#   # One-shot scan (no UI server, just write the report files)
#   docker compose run --rm scan-only
#
#   # Scan and push results to the centralized server
#   docker compose run --rm push
#
# Server usage:
#
#   # Start PostgreSQL + ZincSearch + ollantaweb API
#   docker compose --profile server up -d
#
# Reports are written to <PROJECT_DIR>/.ollanta/
# Scanner UI available at http://localhost:7777
# API server available at http://localhost:8080

name: ollanta

services:

  # ── serve: scan + interactive web UI ────────────────────────────────────────
  serve:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - type: bind
        source: ${PROJECT_DIR:-.}
        target: /project
    ports:
      - "${PORT:-7777}:7777"
    environment:
      - PROJECT_KEY=${PROJECT_KEY:-project}
    command:
      - -project-dir=/project
      - -project-key=${PROJECT_KEY:-project}
      - -format=all
      - -serve
      - -bind=0.0.0.0
      - -port=7777
    restart: "no"

  # ── scan-only: one-shot, no server, exits after writing the report ──────────
  scan-only:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - type: bind
        source: ${PROJECT_DIR:-.}
        target: /project
    command:
      - -project-dir=/project
      - -project-key=${PROJECT_KEY:-project}
      - -format=all
    restart: "no"

  # ── push: scan and push results to ollantaweb ──────────────────────────────
  push:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - type: bind
        source: ${PROJECT_DIR:-.}
        target: /project
    command:
      - -project-dir=/project
      - -project-key=${PROJECT_KEY:-project}
      - -format=all
      - -server=${OLLANTA_SERVER:-http://ollantaweb:8080}
      - -server-token=${OLLANTA_TOKEN:-}
    restart: "no"
    profiles: ["push"]

  # ── postgres: data store ────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ollanta
      POSTGRES_USER: ollanta
      POSTGRES_PASSWORD: ${PG_PASSWORD:-ollanta_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollanta"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["server"]

  # ── zincsearch: full-text search engine ───────────────────────────────────
  zincsearch:
    image: public.ecr.aws/zinclabs/zincsearch:0.4.10
    environment:
      ZINC_FIRST_ADMIN_USER: ${ZINC_USER:-admin}
      ZINC_FIRST_ADMIN_PASSWORD: ${ZINC_PASSWORD:-ollanta_dev}
      ZINC_DATA_PATH: /data
      GIN_MODE: release
    volumes:
      - zsdata:/data
    ports:
      - "4080:4080"
    healthcheck:
      test: ["NONE"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    profiles: ["server"]

  # ── ollantaweb: centralized API server ──────────────────────────────────────
  ollantaweb:
    build:
      context: .
      dockerfile: ollantaweb/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      zincsearch:
        condition: service_started
    environment:
      OLLANTA_ADDR: ":8080"
      OLLANTA_DATABASE_URL: "postgres://ollanta:${PG_PASSWORD:-ollanta_dev}@postgres:5432/ollanta?sslmode=disable"
      OLLANTA_ZINCSEARCH_URL: "http://zincsearch:4080"
      OLLANTA_ZINCSEARCH_USER: "${ZINC_USER:-admin}"
      OLLANTA_ZINCSEARCH_PASSWORD: "${ZINC_PASSWORD:-ollanta_dev}"
      OLLANTA_LOG_LEVEL: "info"
    ports:
      - "8080:8080"
    restart: unless-stopped
    profiles: ["server"]

volumes:
  pgdata:
  zsdata:

# docker-compose.yml
#
# Scanner usage:
#
#   # Scan the current directory and open the web UI on http://localhost:7777
#   docker compose --profile scanner up local-ui
#
#   # Scan a specific project
#   PROJECT_DIR=/path/to/myapp PROJECT_KEY=myapp docker compose --profile scanner up local-ui
#
#   # Enable the local mock AI agent in the scanner UI
#   OLLANTA_AI_ENABLE_MOCK=1 docker compose --profile scanner up -d --build --force-recreate local-ui
#
#   # One-shot scan (no UI server, just write the report files)
#   docker compose --profile scanner run --rm scan-only
#
#   # Scan and push results to the centralized server
#   docker compose run --build --rm push
#
# Server usage:
#
#   # Start PostgreSQL + ZincSearch + ollantaweb API + workers
#   docker compose --profile server up -d
#
#   # Start the local observability stack alongside the server profile
#   docker compose --profile server --profile observability up -d
#
# Reports are written to <PROJECT_DIR>/.ollanta/
# Scanner UI available at http://localhost:7777
# Local AI agents are configured through environment variables on the local-ui service
# API server available at http://localhost:8080
# Background roles: compute, index projection, webhook delivery

name: ollanta

services:

  # local-ui: scan + interactive web UI
  local-ui:
    image: ollanta-scanner:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - type: bind
        source: ${PROJECT_DIR:-.}
        target: /project
    ports:
      - "${PORT:-7777}:7777"
    environment:
      - PROJECT_KEY=${PROJECT_KEY:-project}
      - OLLANTA_LOG_LEVEL=${OLLANTA_LOG_LEVEL:-info}
      - OLLANTA_AI_ENABLE_MOCK=${OLLANTA_AI_ENABLE_MOCK:-}
      - OLLANTA_AI_AGENTS=${OLLANTA_AI_AGENTS:-}
      - OLLANTA_AI_OPENAI_MODEL=${OLLANTA_AI_OPENAI_MODEL:-}
      - OLLANTA_AI_OPENAI_BASE_URL=${OLLANTA_AI_OPENAI_BASE_URL:-}
      - OLLANTA_AI_OPENAI_LABEL=${OLLANTA_AI_OPENAI_LABEL:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    command:
      - -project-dir=/project
      - -project-key=${PROJECT_KEY:-project}
      - -format=all
      - -local-ui
      - -bind=0.0.0.0
      - -port=7777
    restart: "no"
    profiles: ["scanner"]

  # 芒鈥濃偓芒鈥濃偓 scan-only: one-shot, no server, exits after writing the report 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  scan-only:
    image: ollanta-scanner:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - type: bind
        source: ${PROJECT_DIR:-.}
        target: /project
    command:
      - -project-dir=/project
      - -project-key=${PROJECT_KEY:-project}
      - -format=all
    restart: "no"
    profiles: ["scanner"]

  # 芒鈥濃偓芒鈥濃偓 push: scan and push results to ollantaweb 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  push:
    image: ollanta-scanner:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - type: bind
        source: ${PROJECT_DIR:-.}
        target: /project
    command:
      - -project-dir=/project
      - -project-key=${PROJECT_KEY:-project}
      - -format=all
      - -server=${OLLANTA_SERVER:-http://ollantaweb:8080}
      - -server-token=${OLLANTA_TOKEN:-ollanta-dev-scanner-token}
      - -server-wait=${OLLANTA_SERVER_WAIT:-false}
      - -server-wait-timeout=${OLLANTA_SERVER_WAIT_TIMEOUT:-10m}
      - -server-wait-poll=${OLLANTA_SERVER_WAIT_POLL:-2s}
    restart: "no"
    profiles: ["push"]

  # 芒鈥濃偓芒鈥濃偓 postgres: data store 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ollanta
      POSTGRES_USER: ollanta
      POSTGRES_PASSWORD: ${PG_PASSWORD:-ollanta_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollanta"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["server"]

  # 芒鈥濃偓芒鈥濃偓 zincsearch: full-text search engine 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  zincsearch:
    image: public.ecr.aws/zinclabs/zincsearch:0.4.10
    environment:
      ZINC_FIRST_ADMIN_USER: ${ZINC_USER:-admin}
      ZINC_FIRST_ADMIN_PASSWORD: ${ZINC_PASSWORD:-ollanta_dev}
      ZINC_DATA_PATH: /data
      GIN_MODE: release
    volumes:
      - zsdata:/data
    ports:
      - "4080:4080"
    healthcheck:
      test: ["NONE"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    profiles: ["server"]

  # 芒鈥濃偓芒鈥濃偓 ollantaweb: centralized API server 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  ollantaweb:
    image: ollanta-server:latest
    build:
      context: .
      dockerfile: ollantaweb/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      zincsearch:
        condition: service_started
    environment:
      OLLANTA_ADDR: ":8080"
      OLLANTA_DATABASE_URL: "postgres://ollanta:${PG_PASSWORD:-ollanta_dev}@postgres:5432/ollanta?sslmode=disable"
      OLLANTA_ZINCSEARCH_URL: "http://zincsearch:4080"
      OLLANTA_ZINCSEARCH_USER: "${ZINC_USER:-admin}"
      OLLANTA_ZINCSEARCH_PASSWORD: "${ZINC_PASSWORD:-ollanta_dev}"
      OLLANTA_LOG_LEVEL: "info"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}"
      OLLANTA_SCANNER_TOKEN: "${OLLANTA_SCANNER_TOKEN:-ollanta-dev-scanner-token}"
      OLLANTA_OBSERVABILITY_LINKS: "${OLLANTA_OBSERVABILITY_LINKS:-}"
    ports:
      - "8080:8080"
    restart: unless-stopped
    profiles: ["server"]

  # 芒鈥濃偓芒鈥濃偓 ollantaworker: background compute role 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  ollantaworker:
    image: ollanta-server:latest
    build:
      context: .
      dockerfile: ollantaweb/Dockerfile
    entrypoint: ["/ollantaworker"]
    depends_on:
      postgres:
        condition: service_healthy
      zincsearch:
        condition: service_started
    environment:
      OLLANTA_ADMIN_ADDR: ":9090"
      OLLANTA_DATABASE_URL: "postgres://ollanta:${PG_PASSWORD:-ollanta_dev}@postgres:5432/ollanta?sslmode=disable"
      OLLANTA_LOG_LEVEL: "info"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}"
    restart: unless-stopped
    profiles: ["server"]

  # 芒鈥濃偓芒鈥濃偓 ollantaindexer: durable search projection role 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  ollantaindexer:
    image: ollanta-server:latest
    build:
      context: .
      dockerfile: ollantaweb/Dockerfile
    entrypoint: ["/ollantaindexer"]
    depends_on:
      postgres:
        condition: service_healthy
      zincsearch:
        condition: service_started
    environment:
      OLLANTA_ADMIN_ADDR: ":9090"
      OLLANTA_DATABASE_URL: "postgres://ollanta:${PG_PASSWORD:-ollanta_dev}@postgres:5432/ollanta?sslmode=disable"
      OLLANTA_ZINCSEARCH_URL: "http://zincsearch:4080"
      OLLANTA_ZINCSEARCH_USER: "${ZINC_USER:-admin}"
      OLLANTA_ZINCSEARCH_PASSWORD: "${ZINC_PASSWORD:-ollanta_dev}"
      OLLANTA_LOG_LEVEL: "info"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}"
    restart: unless-stopped
    profiles: ["server"]

  # 芒鈥濃偓芒鈥濃偓 ollantawebhookworker: durable webhook delivery role 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  ollantawebhookworker:
    image: ollanta-server:latest
    build:
      context: .
      dockerfile: ollantaweb/Dockerfile
    entrypoint: ["/ollantawebhookworker"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OLLANTA_ADMIN_ADDR: ":9090"
      OLLANTA_DATABASE_URL: "postgres://ollanta:${PG_PASSWORD:-ollanta_dev}@postgres:5432/ollanta?sslmode=disable"
      OLLANTA_LOG_LEVEL: "info"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}"
    restart: unless-stopped
    profiles: ["server"]

  # 芒鈥濃偓芒鈥濃偓 prometheus: metrics scraping and local query UI 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - type: bind
        source: ./deploy/observability/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
      - prometheusdata:/prometheus
    ports:
      - "9091:9090"
    profiles: ["observability"]

  # 芒鈥濃偓芒鈥濃偓 jaeger: tracing backend and UI 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  jaeger:
    image: jaegertracing/all-in-one:1.67.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
    profiles: ["observability"]

  # 芒鈥濃偓芒鈥濃偓 loki: log storage and query API 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  loki:
    image: grafana/loki:3.1.1
    command:
      - -config.file=/etc/loki/config.yml
    volumes:
      - type: bind
        source: ./deploy/observability/loki-config.yml
        target: /etc/loki/config.yml
        read_only: true
      - lokidata:/loki
    ports:
      - "3100:3100"
    profiles: ["observability"]

  # 芒鈥濃偓芒鈥濃偓 promtail: collects container stdout for Loki 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  promtail:
    image: grafana/promtail:3.1.1
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - type: bind
        source: ./deploy/observability/promtail.yml
        target: /etc/promtail/config.yml
        read_only: true
      - /var/run/docker.sock:/var/run/docker.sock
      - promtaildata:/tmp
    depends_on:
      - loki
    profiles: ["observability"]

volumes:
  pgdata:
  zsdata:
  prometheusdata:
  lokidata:
  promtaildata:

# docker-compose.yml
#
# Scanner usage:
#
#   # Scan the current directory and open the web UI on http://localhost:7777
#   docker compose --profile scanner up local-ui
#
#   # Scan a specific project
#   PROJECT_DIR=/path/to/myapp PROJECT_KEY=myapp docker compose --profile scanner up local-ui
#
#   # Enable the local mock AI agent in the scanner UI
#   OLLANTA_AI_ENABLE_MOCK=1 docker compose --profile scanner up -d --build --force-recreate local-ui
#
#   # One-shot scan (no UI server, just write the report files)
#   docker compose --profile scanner run --rm scan-only
#
#   # Scan and push results to the centralized server
#   docker compose run --build --rm push
#
# Server usage:
#
#   # Start PostgreSQL + ZincSearch + ollantaweb API + workers
#   # Set PG_PASSWORD in your shell or .env before starting the server profile.
#   docker compose --profile server up -d
#
#   # Start the local observability stack alongside the server profile
#   docker compose --profile server --profile observability up -d
#
# Reports are written to <PROJECT_DIR>/.ollanta/
# Scanner UI available at http://localhost:7777
# Local AI agents are configured through environment variables on the local-ui service
# API server available at http://localhost:8080
# Background roles: compute, index projection, webhook delivery

name: ollanta

services:

  # local-ui: scan + interactive web UI
  local-ui:
    image: ollanta-scanner:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - type: bind
        source: ${PROJECT_DIR:-.}
        target: /project
    ports:
      - "${PORT:-7777}:7777"
    environment:
      - PROJECT_KEY=${PROJECT_KEY:-project}
      - OLLANTA_LOG_LEVEL=${OLLANTA_LOG_LEVEL:-info}
      - OLLANTA_AI_ENABLE_MOCK=${OLLANTA_AI_ENABLE_MOCK:-}
      - OLLANTA_AI_AGENTS=${OLLANTA_AI_AGENTS:-}
      - OLLANTA_AI_OPENAI_MODEL=${OLLANTA_AI_OPENAI_MODEL:-}
      - OLLANTA_AI_OPENAI_BASE_URL=${OLLANTA_AI_OPENAI_BASE_URL:-}
      - OLLANTA_AI_OPENAI_LABEL=${OLLANTA_AI_OPENAI_LABEL:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    command:
      - -project-dir=/project
      - -project-key=${PROJECT_KEY:-project}
      - -format=all
      - -with-mutations
      - -local-ui
      - -bind=0.0.0.0
      - -port=7777
    restart: "no"
    profiles: ["scanner"]

  # scan-only: one-shot, no server, exits after writing the report
  scan-only:
    image: ollanta-scanner:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - type: bind
        source: ${PROJECT_DIR:-.}
        target: /project
    command:
      - -project-dir=/project
      - -project-key=${PROJECT_KEY:-project}
      - -format=all
      - -with-mutations
    restart: "no"
    profiles: ["scanner"]

  # push: scan and push results to ollantaweb
  push:
    image: ollanta-scanner:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - type: bind
        source: ${PROJECT_DIR:-.}
        target: /project
    command:
      - -project-dir=/project
      - -project-key=${PROJECT_KEY:-project}
      - -format=all
      - -with-mutations
      - -server=${OLLANTA_SERVER:-http://ollantaweb:8080}
      - -server-token=${OLLANTA_TOKEN:-ollanta-dev-scanner-token}
      - -server-wait=${OLLANTA_SERVER_WAIT:-false}
      - -server-wait-timeout=${OLLANTA_SERVER_WAIT_TIMEOUT:-10m}
      - -server-wait-poll=${OLLANTA_SERVER_WAIT_POLL:-2s}
    restart: "no"
    profiles: ["push"]

  # postgres: data store
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ollanta
      POSTGRES_USER: ollanta
      POSTGRES_PASSWORD: ${PG_PASSWORD:-ollanta_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollanta"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["server"]

  # zincsearch: full-text search engine
  zincsearch:
    image: public.ecr.aws/zinclabs/zincsearch:0.4.10
    environment:
      ZINC_FIRST_ADMIN_USER: ${ZINC_USER:-admin}
      ZINC_FIRST_ADMIN_PASSWORD: ${ZINC_PASSWORD:-ollanta_dev}
      ZINC_DATA_PATH: /data
      GIN_MODE: release
    volumes:
      - zsdata:/data
    ports:
      - "4080:4080"
    healthcheck:
      test: ["NONE"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    profiles: ["server"]

  # ollantaweb: centralized API server
  ollantaweb:
    image: ollanta-server:latest
    build:
      context: .
      dockerfile: ollantaweb/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      zincsearch:
        condition: service_started
    environment:
      OLLANTA_ADDR: ":8080"
      OLLANTA_DATABASE_URL: "postgres://ollanta:${PG_PASSWORD:-ollanta_dev}@postgres:5432/ollanta?sslmode=disable"
      OLLANTA_ZINCSEARCH_URL: "http://zincsearch:4080"
      OLLANTA_ZINCSEARCH_USER: "${ZINC_USER:-admin}"
      OLLANTA_ZINCSEARCH_PASSWORD: "${ZINC_PASSWORD:-ollanta_dev}"
      OLLANTA_LOG_LEVEL: "info"
      OLLANTA_JWT_SECRET: "${OLLANTA_JWT_SECRET:-ollanta-dev-jwt-secret-change-me}"
      OLLANTA_AUTO_MIGRATE: "${OLLANTA_AUTO_MIGRATE:-true}"
      OLLANTA_CORS_ALLOWED_ORIGINS: "${OLLANTA_CORS_ALLOWED_ORIGINS:-http://localhost:8080}"
      OLLANTA_HTTP_MAX_BODY_BYTES: "${OLLANTA_HTTP_MAX_BODY_BYTES:-10485760}"
      OLLANTA_SCAN_QUEUE_MAX_ACCEPTED: "${OLLANTA_SCAN_QUEUE_MAX_ACCEPTED:-0}"
      OLLANTA_SCAN_QUEUE_MAX_RUNNING: "${OLLANTA_SCAN_QUEUE_MAX_RUNNING:-0}"
      OLLANTA_SCAN_QUEUE_MAX_OLDEST_ACCEPTED_AGE: "${OLLANTA_SCAN_QUEUE_MAX_OLDEST_ACCEPTED_AGE:-0s}"
      OLLANTA_SCAN_QUEUE_RETRY_AFTER: "${OLLANTA_SCAN_QUEUE_RETRY_AFTER:-30s}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}"
      OLLANTA_SCANNER_TOKEN: "${OLLANTA_SCANNER_TOKEN:-ollanta-dev-scanner-token}"
      OLLANTA_OBSERVABILITY_LINKS: "${OLLANTA_OBSERVABILITY_LINKS:-}"
    ports:
      - "8080:8080"
    restart: unless-stopped
    profiles: ["server"]

  # ollantaworker: background compute role
  ollantaworker:
    image: ollanta-server:latest
    build:
      context: .
      dockerfile: ollantaweb/Dockerfile
    entrypoint: ["/ollantaworker"]
    depends_on:
      postgres:
        condition: service_healthy
      zincsearch:
        condition: service_started
    environment:
      OLLANTA_ADMIN_ADDR: ":9090"
      OLLANTA_DATABASE_URL: "postgres://ollanta:${PG_PASSWORD:-ollanta_dev}@postgres:5432/ollanta?sslmode=disable"
      OLLANTA_LOG_LEVEL: "info"
      OLLANTA_JWT_SECRET: "${OLLANTA_JWT_SECRET:-ollanta-dev-jwt-secret-change-me}"
      OLLANTA_AUTO_MIGRATE: "${OLLANTA_AUTO_MIGRATE:-true}"
      OLLANTA_SCAN_JOB_STALE_AFTER: "${OLLANTA_SCAN_JOB_STALE_AFTER:-15m}"
      OLLANTA_SCAN_JOB_MAX_ATTEMPTS: "${OLLANTA_SCAN_JOB_MAX_ATTEMPTS:-3}"
      OLLANTA_SCAN_JOB_RECOVERY_INTERVAL: "${OLLANTA_SCAN_JOB_RECOVERY_INTERVAL:-1m}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}"
    restart: unless-stopped
    profiles: ["server"]

  # ollantaindexer: durable search projection role
  ollantaindexer:
    image: ollanta-server:latest
    build:
      context: .
      dockerfile: ollantaweb/Dockerfile
    entrypoint: ["/ollantaindexer"]
    depends_on:
      postgres:
        condition: service_healthy
      zincsearch:
        condition: service_started
    environment:
      OLLANTA_ADMIN_ADDR: ":9090"
      OLLANTA_DATABASE_URL: "postgres://ollanta:${PG_PASSWORD:-ollanta_dev}@postgres:5432/ollanta?sslmode=disable"
      OLLANTA_ZINCSEARCH_URL: "http://zincsearch:4080"
      OLLANTA_ZINCSEARCH_USER: "${ZINC_USER:-admin}"
      OLLANTA_ZINCSEARCH_PASSWORD: "${ZINC_PASSWORD:-ollanta_dev}"
      OLLANTA_LOG_LEVEL: "info"
      OLLANTA_JWT_SECRET: "${OLLANTA_JWT_SECRET:-ollanta-dev-jwt-secret-change-me}"
      OLLANTA_AUTO_MIGRATE: "${OLLANTA_AUTO_MIGRATE:-true}"
      OLLANTA_INDEX_JOB_STALE_AFTER: "${OLLANTA_INDEX_JOB_STALE_AFTER:-15m}"
      OLLANTA_INDEX_JOB_MAX_ATTEMPTS: "${OLLANTA_INDEX_JOB_MAX_ATTEMPTS:-3}"
      OLLANTA_INDEX_JOB_RECOVERY_INTERVAL: "${OLLANTA_INDEX_JOB_RECOVERY_INTERVAL:-1m}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}"
    restart: unless-stopped
    profiles: ["server"]

  # ollantawebhookworker: durable webhook delivery role
  ollantawebhookworker:
    image: ollanta-server:latest
    build:
      context: .
      dockerfile: ollantaweb/Dockerfile
    entrypoint: ["/ollantawebhookworker"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OLLANTA_ADMIN_ADDR: ":9090"
      OLLANTA_DATABASE_URL: "postgres://ollanta:${PG_PASSWORD:-ollanta_dev}@postgres:5432/ollanta?sslmode=disable"
      OLLANTA_LOG_LEVEL: "info"
      OLLANTA_JWT_SECRET: "${OLLANTA_JWT_SECRET:-ollanta-dev-jwt-secret-change-me}"
      OLLANTA_AUTO_MIGRATE: "${OLLANTA_AUTO_MIGRATE:-true}"
      OLLANTA_WEBHOOK_JOB_STALE_AFTER: "${OLLANTA_WEBHOOK_JOB_STALE_AFTER:-15m}"
      OLLANTA_WEBHOOK_JOB_MAX_ATTEMPTS: "${OLLANTA_WEBHOOK_JOB_MAX_ATTEMPTS:-3}"
      OLLANTA_WEBHOOK_JOB_RECOVERY_INTERVAL: "${OLLANTA_WEBHOOK_JOB_RECOVERY_INTERVAL:-1m}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}"
    restart: unless-stopped
    profiles: ["server"]

  # ollantamigrate: one-shot schema migration operation for deploy jobs
  ollantamigrate:
    image: ollanta-server:latest
    build:
      context: .
      dockerfile: ollantaweb/Dockerfile
    entrypoint: ["/ollantamigrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OLLANTA_DATABASE_URL: "postgres://ollanta:${PG_PASSWORD:-ollanta_dev}@postgres:5432/ollanta?sslmode=disable"
      OLLANTA_LOG_LEVEL: "info"
      OLLANTA_JWT_SECRET: "${OLLANTA_JWT_SECRET:-ollanta-dev-jwt-secret-change-me}"
    restart: "no"
    profiles: ["migrate"]

  # prometheus: metrics scraping and local query UI
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - type: bind
        source: ./deploy/observability/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
      - prometheusdata:/prometheus
    ports:
      - "9091:9090"
    profiles: ["observability"]

  # jaeger: tracing backend and UI
  jaeger:
    image: jaegertracing/all-in-one:1.67.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
    profiles: ["observability"]

  # loki: log storage and query API
  loki:
    image: grafana/loki:3.1.1
    command:
      - -config.file=/etc/loki/config.yml
    volumes:
      - type: bind
        source: ./deploy/observability/loki-config.yml
        target: /etc/loki/config.yml
        read_only: true
      - lokidata:/loki
    ports:
      - "3100:3100"
    profiles: ["observability"]

  # promtail: collects container stdout for Loki
  promtail:
    image: grafana/promtail:3.1.1
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - type: bind
        source: ./deploy/observability/promtail.yml
        target: /etc/promtail/config.yml
        read_only: true
      - /var/run/docker.sock:/var/run/docker.sock
      - promtaildata:/tmp
    depends_on:
      - loki
    profiles: ["observability"]

volumes:
  pgdata:
  zsdata:
  prometheusdata:
  lokidata:
  promtaildata:

# Backward-compatible localhost-focused copy of the shared local config.
# Prefer config/config.toml for new setups; this file remains available for existing local workflows.

[scanner]
project_dir = "."
sources = ["./..."]
exclusions = []
format = "all"
serve = true
bind = "127.0.0.1"
port = 7777
server = "http://localhost:8080"
server_token = "ollanta-dev-scanner-token"
server_wait = false
server_wait_timeout = "10m"
server_wait_poll = "2s"

[server]
addr = ":8080"
host = "0.0.0.0"
port = 8080
public_url = "http://localhost:8080"
database_url = "postgres://ollanta:ollanta_dev@localhost:5432/ollanta?sslmode=disable"
search_backend = "zincsearch"
log_level = "info"
scanner_token = "ollanta-dev-scanner-token"
jwt_expiry = "15m"
refresh_expiry = "720h"

[database]
host = "localhost"
port = 5432
name = "ollanta"
user = "ollanta"
password = "ollanta_dev"
sslmode = "disable"

[search]
scheme = "http"
host = "localhost"
port = 4080
user = "admin"
password = "ollanta_dev"

[zincsearch]
url = "http://localhost:4080"
user = "admin"
password = "ollanta_dev"

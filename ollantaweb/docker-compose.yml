name: ollantaweb

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ollanta
      POSTGRES_USER: ollanta
      POSTGRES_PASSWORD: ${PG_PASSWORD:-ollanta_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollanta"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.13
    environment:
      MEILI_MASTER_KEY: ${MEILI_KEY:-ollanta_dev_key}
      MEILI_ENV: development
    volumes:
      - msdata:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7700/health | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollantaweb:
    build:
      context: ..
      dockerfile: ollantaweb/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      OLLANTA_ADDR: ":8080"
      OLLANTA_DATABASE_URL: "postgres://ollanta:${PG_PASSWORD:-ollanta_dev}@postgres:5432/ollanta?sslmode=disable"
      OLLANTA_MEILISEARCH_URL: "http://meilisearch:7700"
      OLLANTA_MEILISEARCH_KEY: "${MEILI_KEY:-ollanta_dev_key}"
      OLLANTA_LOG_LEVEL: "info"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
  msdata:

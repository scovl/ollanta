<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ollanta Report</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <img class="brand-mark" src="/branding/ollanta-mark.png" alt="Ollanta" width="34" height="34" />
      </div>
      <div class="header-meta">
        <span id="project-key" class="project-key"></span>
        <span class="sep">/</span>
        <span id="scan-version"></span>
        <span class="sep">·</span>
        <span id="scan-date"></span>
        <span class="sep">·</span>
        <span id="elapsed" class="text-muted"></span>
      </div>
      <div class="header-right">
        <kbd class="kbd-hint">j/k</kbd> navigate
        <kbd class="kbd-hint">Esc</kbd> close
      </div>
    </div>
  </header>

  <main id="app">
    <!-- ── Quality Gate Hero ──────────────────────────────────────────── -->
    <section id="gate-hero" class="gate-hero gate-loading">
      <div class="gate-badge">
        <span id="gate-icon" class="gate-icon"></span>
        <div class="gate-text">
          <span class="gate-label">Quality Gate</span>
          <span id="gate-status" class="gate-status">Evaluating…</span>
        </div>
      </div>
      <div id="gate-conditions" class="gate-conditions"></div>
    </section>

    <!-- ── Tabs ───────────────────────────────────────────────────────── -->
    <nav class="tabs">
      <button class="tab active" data-tab="overview">Overview</button>
      <button class="tab" data-tab="issues">
        Issues <span id="tab-issue-count" class="tab-badge">0</span>
      </button>
      <button class="tab" data-tab="files">
        Files <span id="tab-file-count" class="tab-badge">0</span>
      </button>
    </nav>

    <!-- ── Overview Tab ───────────────────────────────────────────────── -->
    <div id="panel-overview" class="panel">
      <!-- Measures -->
      <div class="measures-row">
        <div id="card-bugs" class="metric-card">
          <span class="metric-value" id="m-bugs">0</span>
          <span class="metric-label">Bugs</span>
        </div>
        <div id="card-vulns" class="metric-card">
          <span class="metric-value" id="m-vulns">0</span>
          <span class="metric-label">Vulnerabilities</span>
        </div>
        <div id="card-smells" class="metric-card">
          <span class="metric-value" id="m-smells">0</span>
          <span class="metric-label">Code Smells</span>
        </div>
        <div id="card-ncloc" class="metric-card">
          <span class="metric-value" id="m-ncloc">0</span>
          <span class="metric-label">Lines of Code</span>
        </div>
        <div id="card-files" class="metric-card">
          <span class="metric-value" id="m-files">0</span>
          <span class="metric-label">Files</span>
        </div>
        <div id="card-comments" class="metric-card">
          <span class="metric-value" id="m-comments">0</span>
          <span class="metric-label">Comment Lines</span>
        </div>
      </div>

      <!-- Severity distribution -->
      <div class="overview-grid">
        <div class="overview-card">
          <h3>Severity Distribution</h3>
          <div id="sev-bars" class="sev-bars"></div>
          <div id="sev-proportional" class="sev-proportional"></div>
        </div>

        <div class="overview-card">
          <h3>Issue Types</h3>
          <div id="type-bars" class="sev-bars"></div>
        </div>
      </div>

      <!-- Hotspot files + Languages -->
      <div class="overview-grid">
        <div class="overview-card">
          <h3>Hotspot Files</h3>
          <div id="hotspot-files" class="hotspot-list"></div>
        </div>
        <div class="overview-card">
          <h3>Languages</h3>
          <div id="by-lang" class="lang-bars"></div>
        </div>
      </div>
    </div>

    <!-- ── Issues Tab ─────────────────────────────────────────────────── -->
    <div id="panel-issues" class="panel hidden">
      <div class="toolbar">
        <div class="toolbar-left">
          <input id="search" type="search" placeholder="Search file, message, rule…" autocomplete="off" />
          <select id="filter-severity">
            <option value="all">All severities</option>
            <option value="blocker">Blocker</option>
            <option value="critical">Critical</option>
            <option value="major">Major</option>
            <option value="minor">Minor</option>
            <option value="info">Info</option>
          </select>
          <select id="filter-type">
            <option value="all">All types</option>
            <option value="bug">Bug</option>
            <option value="code_smell">Code Smell</option>
            <option value="vulnerability">Vulnerability</option>
          </select>
          <select id="filter-rule">
            <option value="all">All rules</option>
          </select>
        </div>
        <div class="toolbar-right">
          <span id="issue-count" class="result-count"></span>
        </div>
      </div>

      <!-- Severity chips -->
      <div id="sev-chips" class="sev-chips"></div>

      <!-- Issue list -->
      <div id="issue-list" class="issue-list">
        <div class="empty-state">Loading…</div>
      </div>
    </div>

    <!-- ── Files Tab ──────────────────────────────────────────────────── -->
    <div id="panel-files" class="panel hidden">
      <div id="file-tree" class="file-tree">
        <div class="empty-state">Loading…</div>
      </div>
    </div>

    <!-- ── Issue Detail Panel (slide-out) ─────────────────────────────── -->
    <aside id="detail-panel" class="detail-panel">
      <div class="detail-header">
        <h3 id="detail-title">Issue Details</h3>
        <button id="detail-close" class="detail-close" aria-label="Close">×</button>
      </div>
      <div id="detail-body" class="detail-body"></div>
    </aside>
    <div id="detail-overlay" class="detail-overlay"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
